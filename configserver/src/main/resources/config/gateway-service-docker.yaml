spring:
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: http://user-service:8082
          predicates:
            - Path=/api/users/**
        - id: product-service
          uri: http://product-service:8081
          predicates:
            - Path=/api/products/**
        - id: order-service
          uri: http://order-service:8083
          predicates:
            - Path=/api/orders/**,/api/cart/**
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://auth.localtest.me/realms/ecom-app
          jwk-set-uri: http://keycloak:8080/realms/ecom-app/protocol/openid-connect/certs

management:
  endpoints:
    web:
      exposure:
        include: "*"

server:
  port: 8080